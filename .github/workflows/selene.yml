name: Luau Lint (selene)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install selene
        run: |
          curl -L https://github.com/Kampfkarren/selene/releases/latest/download/selene-linux-x86_64.zip -o selene.zip
          unzip selene.zip
          chmod +x selene
          sudo mv selene /usr/local/bin/

      - name: Create selene config
        run: |
          cat > selene.toml <<'EOF'
          std = "roblox+luau"
          [lints]
          global_usage = "allow"
          unused_variable = "warn"
          bad_string_escape = "allow"
          EOF

      - name: Run selene
        run: selene --config selene.toml src/ main.lua loader.lua || true
        continue-on-error: true
